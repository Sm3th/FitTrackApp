<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logogym.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f97316" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="FitTrack Pro — Track workouts, measure progress, and crush your fitness goals with AI-powered insights." />
    <meta name="keywords" content="fitness, workout tracker, nutrition, gym, personal trainer, PWA" />
    <meta name="author" content="FitTrack Pro" />
    <meta name="robots" content="index, follow" />

    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FitTrack" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logogym.png" />

    <!-- Fonts — preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- DNS prefetch -->
    <link rel="dns-prefetch" href="http://localhost:3000" />
    <link rel="dns-prefetch" href="https://world.openfoodfacts.org" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:title" content="FitTrack Pro — Your Fitness Companion" />
    <meta property="og:description" content="Track workouts, nutrition, and progress with AI-powered analytics." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logogym.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FitTrack Pro" />
    <meta name="twitter:description" content="AI-powered fitness tracking app" />

    <title>FitTrack Pro — Your Fitness Companion</title>
  </head>
  <body>
    <!-- Anti-FOUC: apply theme/font BEFORE React renders -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          if (t === 'dark') document.documentElement.classList.add('dark');

          var ct = localStorage.getItem('colorTheme') || 'blue';
          document.documentElement.setAttribute('data-color-theme', ct);

          var fs = localStorage.getItem('fontSize') || 'medium';
          if (fs !== 'medium') document.documentElement.setAttribute('data-font-size', fs);
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
